<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Cursor</title>
  <link rel="icon" href="https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }

    /* Body Styling */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      overflow: hidden;
      position: relative;
      padding: 20px;
      text-align: center;
    }

    /* Falling effect container */
    .falling-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    /* Falling animation */
    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }

    .falling-item {
      position: absolute;
      animation: fall linear infinite;
      will-change: transform, opacity;
    }

    /* Main Container */
    .container {
      max-width: 600px;
      text-align: center;
    }

    /* Header */
    h1 {
      font-size: 3em;
      font-weight: 600;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
    }

    /* Features Section */
    .features p {
      font-size: 1.2em;
      margin: 10px 0;
      color: #e0e0e0;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
    }

    /* Button */
    .play-button {
      display: inline-block;
      padding: 15px 30px;
      background-color: #ffcc00;
      color: #333;
      font-size: 1.2em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.3s;
      box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.2);
    }

    .play-button:hover {
      background-color: #ffaa00;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Falling images container -->
  <div class="falling-container" id="fallingContainer"></div>

  <!-- Main Content Container -->
  <div class="container">
    <h1>Welcome to Course Cursor</h1>
    <div class="features">
      <p>Click your way to earn cash and upgrade your click power!</p>
      <p>Design custom levels and challenge other players!</p>
      <p>Track your stats and become the top earner!</p>
    </div>
    <a href="https://course-cursor.onrender.com" class="play-button">Play Now</a>
  </div>

  <script>
    const numberOfFallingItems = 25; 
    const images = [
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/ClickCursorCash.png?raw=true',
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true'
    ];

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    const container = document.getElementById('fallingContainer');
    for (let i = 0; i < numberOfFallingItems; i++) {
      const img = document.createElement('img');
      img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add('falling-item');
      img.style.width = `${random(20, 60)}px`;
      img.style.left = `${random(0, 100)}vw`;
      img.style.animationDuration = `${random(7, 15)}s`;
      img.style.opacity = random(0.5, 1);
      img.style.filter = `brightness(${random(0.5, 1.2)})`;
      container.appendChild(img);
    }
  </script>

</body>
</html>
