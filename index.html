<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Cursor</title>
  <link rel="icon" href="https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', Arial, sans-serif;
    }

    /* Body Styling */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      overflow: hidden;
      position: relative;
      padding: 20px;
      text-align: center;
    }

    /* Falling effect container */
    .falling-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    /* Falling animation */
    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }

    /* Main Content */
    .container {
      max-width: 600px;
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    /* Header */
    h1 {
      font-size: 3.2em;
      font-weight: 600;
      margin-bottom: 20px;
      color: #ffdd57;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* Features Section */
    .features p {
      font-size: 1.1em;
      margin: 10px 0;
      color: #e0e0e0;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
      line-height: 1.6em;
    }

    /* Button */
    .play-button {
      display: inline-block;
      padding: 15px 30px;
      background: linear-gradient(45deg, #28a745, #ff8c00, #007bff);
      background-size: 400% 400%;
      color: #fff;
      font-size: 1.3em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s;
      animation: gradientShift 6s ease infinite;
    }

    /* Gradient animation */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Hover effects */
    .play-button:hover {
      transform: scale(1.15);
      box-shadow: 4px 6px 15px rgba(255, 255, 255, 0.6);
      filter: brightness(1.3);
    }

    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Falling images container -->
  <div class="falling-container" id="fallingContainer"></div>

  <!-- Main Content Container -->
  <div class="container">
    <h1>Course Cursor</h1>
    <div class="features">
      <p>✨ Click your way to wealth in a thrilling adventure!</p>
      <p>🛠️ Upgrade, customize, and conquer with each level.</p>
      <p>🌐 Compete globally: Design and share levels to challenge friends.</p>
      <p>📈 Track stats, rise to the top, and claim your place among the best!</p>
    </div>
    <a href="https://course-cursor.onrender.com" class="play-button">Start Playing Now</a>
  </div>

  <script>
    const numberOfFallingItems = 30; 
    const images = [
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/ClickCursorCash.png?raw=true',
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true'
    ];

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    const container = document.getElementById('fallingContainer');
    for (let i = 0; i < numberOfFallingItems; i++) {
      const img = document.createElement('img');
      img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add('falling-item');

      img.style.width = `${random(20, 60)}px`;
      img.style.left = `${random(0, 100)}vw`;
      img.style.opacity = random(0.5, 0.9);
      img.style.filter = `brightness(${random(0.6, 1.3)})`;

      const fallDuration = random(7, 15);
      const rotationSpeed = random(5, 10);
      img.style.animation = `fall ${fallDuration}s linear infinite, 
                             fall ${rotationSpeed}s linear infinite`;

      container.appendChild(img);
    }
  </script>

</body>
</html>
