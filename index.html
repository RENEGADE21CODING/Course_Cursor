<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Cursor</title>
  <link rel="icon" href="https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true" type="image/png">
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* Body Styling */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Falling effect container */
    .falling-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    /* Falling animation */
    @keyframes fall {
      from {
        transform: translateY(-100px);
        opacity: 1;
      }
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    .falling-item {
      position: absolute;
      animation: fall linear infinite;
      will-change: transform, opacity;
    }

    /* Main Container */
    .container {
      text-align: center;
      max-width: 600px;
    }

    /* Header */
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    /* Features Section */
    .features {
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    .features p {
      margin: 10px 0;
    }

    /* Button */
    .play-button {
      display: inline-block;
      padding: 15px 30px;
      background-color: #ffcc00;
      color: #333;
      font-size: 1.2em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .play-button:hover {
      background-color: #ffaa00;
    }
  </style>
</head>
<body>

  <!-- Falling images container -->
  <div class="falling-container" id="fallingContainer"></div>

  <!-- Main Content Container -->
  <div class="container">
    <h1>Welcome to Course Cursor</h1>
    <div class="features">
      <p>Click your way to earn cash and upgrade your click power!</p>
      <p>Design custom levels and challenge other players!</p>
      <p>Track your stats and become the top earner!</p>
    </div>
    <a href="https://course-cursor.onrender.com" class="play-button">Play Now</a>
  </div>

  <script>
    // Number of falling items
    const numberOfFallingItems = 25; 

    // Array of images to fall
    const images = [
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/ClickCursorCash.png?raw=true',
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true'
    ];

    // Function to generate a random number between min and max
    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    // Generate falling items
    const container = document.getElementById('fallingContainer');
    for (let i = 0; i < numberOfFallingItems; i++) {
      const img = document.createElement('img');
      img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add('falling-item');

      // Random size, position, and animation duration for depth effect
      img.style.width = `${random(20, 50)}px`;
      img.style.left = `${random(0, 100)}vw`;
      img.style.animationDuration = `${random(5, 15)}s`;
      img.style.opacity = random(0.5, 1);
      img.style.filter = `brightness(${random(0.5, 1.2)})`;

      // Append to the container
      container.appendChild(img);
    }
  </script>

</body>
</html>
