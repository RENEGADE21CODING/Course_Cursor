<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Cursor</title>
  <link rel="icon" href="https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true" type="image/png">
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    /* Body Styling */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      overflow: hidden;
      position: relative;
      font-family: 'Arial', sans-serif;
      letter-spacing: 0.5px;
    }

    /* Falling effect container */
    .falling-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    /* Falling animation */
    @keyframes fall {
      from {
        transform: translateY(-100px);
        opacity: 1;
      }
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    .falling-item {
      position: absolute;
      animation: fall linear infinite;
      will-change: transform, opacity;
    }

    /* Main Container */
    .container {
      text-align: center;
      max-width: 700px;
      margin: 0 20px;
    }

    /* Header */
    h1 {
      font-size: 3.5em;
      font-weight: bold;
      text-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    /* Features Section */
    .features {
      font-size: 1.25em;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .features p {
      margin: 15px 0;
      color: #e0e0e0;
    }

    .features p strong {
      color: #ffcc00;
    }

    /* Play Button */
    .play-button {
      display: inline-block;
      padding: 20px 40px;
      background: linear-gradient(45deg, #ff0044, #00b7ff, #9d00ff, #ff9a00, #8eff00);
      background-size: 400% 400%;
      color: #fff;
      font-size: 1.5em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      transition: background 1s, transform 0.3s, box-shadow 0.3s ease-in-out;
      background-position: 0 50%;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
    }

    .play-button:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 15px rgba(255, 255, 255, 0.3);
    }

    /* Play Button Gradient Animation */
    @keyframes gradientAnimation {
      0% {
        background-position: 0 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0 50%;
      }
    }

    .play-button {
      animation: gradientAnimation 5s ease infinite;
    }

    /* Animation for falling items */
    .falling-item {
      width: 30px;
      height: 30px;
      opacity: 0.8;
      filter: brightness(1.5);
    }
  </style>
</head>
<body>

  <!-- Falling images container -->
  <div class="falling-container" id="fallingContainer"></div>

  <!-- Main Content Container -->
  <div class="container">
    <h1>Welcome to Course Cursor</h1>
    <div class="features">
      <p><strong>Earn</strong> cash with every click and power up your abilities!</p>
      <p><strong>Create</strong> custom levels and challenge players worldwide!</p>
      <p><strong>Track</strong> your progress and become the <strong>top earner!</strong></p>
    </div>
    <a href="https://course-cursor.onrender.com" class="play-button">Start Your Adventure</a>
  </div>

  <script>
    // Number of falling items
    const numberOfFallingItems = 30;

    // Array of images to fall
    const images = [
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/ClickCursorCash.png?raw=true',
      'https://github.com/RENEGADE21CODING/Platicker-A_Platform_Clicker_Game/blob/main/CursorCoin.png?raw=true'
    ];

    // Function to generate a random number between min and max
    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    // Generate falling items
    const container = document.getElementById('fallingContainer');
    for (let i = 0; i < numberOfFallingItems; i++) {
      const img = document.createElement('img');
      img.src = images[Math.floor(Math.random() * images.length)];
      img.classList.add('falling-item');

      // Random size, position, and animation duration for depth effect
      img.style.width = `${random(30, 60)}px`;
      img.style.left = `${random(0, 100)}vw`;
      img.style.animationDuration = `${random(5, 15)}s`;
      img.style.opacity = random(0.5, 1);
      img.style.filter = `brightness(${random(0.5, 1.2)})`;

      // Append to the container
      container.appendChild(img);
    }
  </script>

</body>
</html>
